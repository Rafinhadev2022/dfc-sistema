services:
  - type: web
    name: dfc-sistema
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: dfc-data
      mountPath: /opt/render/project/src/instance
      sizeGB: 1
