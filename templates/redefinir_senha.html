<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redefinir Senha - DFC Sistema</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-icon">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
        </div>
        <h1>Nova Senha</h1>
        <p>Olá, <strong>{{ user.name }}</strong></p>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}{% for cat, msg in messages %}
          <div class="alert alert-{{ cat }}">{{ msg }}</div>
        {% endfor %}{% endif %}
      {% endwith %}

      <form method="POST">
        <div class="form-group">
          <label>Nova senha <span class="required">*</span></label>
          <div class="input-password-wrap">
            <input type="password" name="nova_senha" id="nova-senha" class="form-control" required minlength="6" placeholder="Mínimo 6 caracteres" autofocus>
            <button type="button" class="toggle-password" onclick="togglePass('nova-senha')">👁</button>
          </div>
        </div>
        <div class="form-group">
          <label>Confirmar nova senha <span class="required">*</span></label>
          <div class="input-password-wrap">
            <input type="password" name="confirmar_senha" id="conf-senha" class="form-control" required minlength="6" placeholder="Repita a nova senha">
            <button type="button" class="toggle-password" onclick="togglePass('conf-senha')">👁</button>
          </div>
        </div>
        <div id="senha-match-msg" style="font-size:12px;margin-bottom:10px"></div>
        <button type="submit" class="btn btn-primary btn-block">Salvar nova senha</button>
      </form>
      <div style="text-align:center;margin-top:14px">
        <a href="{{ url_for('login') }}" style="font-size:12px;color:#6b7280">← Voltar ao login</a>
      </div>
    </div>
  </div>
  <script>
  function togglePass(id) {
    const el = document.getElementById(id);
    el.type = el.type === 'password' ? 'text' : 'password';
  }
  const n = document.getElementById('nova-senha');
  const c = document.getElementById('conf-senha');
  const m = document.getElementById('senha-match-msg');
  function check() {
    if (!c.value) { m.textContent=''; return; }
    if (n.value === c.value) { m.textContent='✓ Senhas coincidem'; m.style.color='#059669'; }
    else { m.textContent='✗ Senhas não coincidem'; m.style.color='#dc2626'; }
  }
  n.addEventListener('input', check);
  c.addEventListener('input', check);
  </script>
</body>
</html>
